name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Cache F1DB download
        uses: actions/cache@v4
        with:
          path: .f1db-cache
          key: f1db-cache-${{ hashFiles('scripts/build-data.ts', 'scripts/driver-ratings.ts', 'scripts/component-ratings.ts') }}

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:pages
        env:
          GITHUB_PAGES: 'true'
          GITHUB_PAGES_CUSTOM_DOMAIN: 'true'
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
          VITE_DEV_GATE_KEY: ${{ secrets.VITE_DEV_GATE_KEY }}
          VITE_RESPINS_PER_RUN: '3'

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
